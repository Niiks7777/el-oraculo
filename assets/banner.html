<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 640px; overflow: hidden;
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
body::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(168,85,247,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 50%, rgba(59,130,246,0.08) 0%, transparent 50%);
}
body::after {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}
.content { position: relative; z-index: 1; text-align: center; }
.emoji { font-size: 72px; margin-bottom: 16px; filter: drop-shadow(0 0 30px rgba(168,85,247,0.5)); }
h1 {
  font-size: 64px; font-weight: 800; letter-spacing: -2px;
  background: linear-gradient(135deg, #f4f4f5 0%, #a855f7 50%, #3b82f6 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.subtitle {
  font-size: 22px; color: #a1a1aa; font-weight: 400; letter-spacing: 1px;
  margin-bottom: 36px;
}
.pills { display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; }
.pill {
  padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 600;
  border: 1px solid rgba(168,85,247,0.3);
  background: rgba(168,85,247,0.08);
  color: #c4b5fd;
}
.pill.blue { border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); color: #93c5fd; }
.pill.green { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); color: #86efac; }
.pill.amber { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); color: #fcd34d; }
.url { font-size: 15px; color: #52525b; font-family: 'JetBrains Mono', monospace; }
.border-glow {
  position: absolute; inset: 0;
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 0;
}
</style>
</head>
<body>
<div class="border-glow"></div>
<div class="content">
  <div class="emoji">🔮</div>
  <h1>El Oraculo</h1>
  <div class="subtitle">Autonomous AI Trading Enhancement Engine</div>
  <div class="pills">
    <span class="pill">HMM Markov</span>
    <span class="pill blue">LLM Predictions</span>
    <span class="pill green">Autoresearch</span>
    <span class="pill amber">Grid Optimization</span>
  </div>
  <div class="url">github.com/Niiks7777/el-oraculo</div>
</div>
</body>
</html>
